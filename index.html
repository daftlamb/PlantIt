<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant It — Generative Botany</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--surface:#f0ede6;--border:#ddd8cc;
  --text:#1a1a1a;--muted:#888070;--accent:#3a6644;
  --header-h:48px;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{
  height:var(--header-h);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--border);
  background:rgba(247,245,240,.95);backdrop-filter:blur(8px);z-index:10;
}
.logo{font-size:15px;font-weight:500}.logo span{color:var(--accent)}
.hbtn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:inherit;font-size:11px;padding:5px 12px;cursor:pointer;transition:all .15s;letter-spacing:.04em}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}

#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;position:relative}
#p5-canvas-wrap canvas{border-radius:4px;box-shadow:0 2px 24px rgba(0,0,0,.08)}

#panel{
  flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);
  padding:14px 20px 16px;display:flex;flex-direction:column;gap:10px;
}
.search-row{display:flex;gap:8px}
.sinput{flex:1;background:white;border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.sinput:focus{border-color:var(--accent)}
.gbtn{background:var(--accent);border:none;border-radius:8px;color:white;font-family:inherit;font-size:12px;font-weight:500;padding:9px 18px;cursor:pointer;transition:background .15s;letter-spacing:.02em}
.gbtn:hover{background:#2d5235}.gbtn:disabled{opacity:.5;cursor:not-allowed}

.examples{display:flex;gap:6px;flex-wrap:wrap}
.exbtn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:inherit;font-size:10px;padding:4px 12px;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.exbtn:hover{border-color:var(--accent);color:var(--accent)}

#meta-row{display:none;align-items:center;justify-content:space-between;gap:8px}
.plant-name{font-size:13px;font-weight:400}.plant-sci{font-size:10px;color:var(--muted);font-style:italic;margin-top:1px}
.plant-tags{display:flex;gap:4px;margin-top:3px}
.ptag{font-size:9px;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:1px 8px;letter-spacing:.04em}
.expbtn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:11px;padding:7px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.expbtn:hover{border-color:var(--accent);color:var(--accent)}

#status{font-size:11px;color:var(--muted);letter-spacing:.04em;min-height:14px}

.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
.modal-bd.open{display:flex}
.modal{background:white;border-radius:12px;padding:28px;max-width:300px;width:90%;position:relative}
.modal h3{font-size:14px;font-weight:500;margin-bottom:10px}
.modal p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:6px}
.mclose{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="logo">Plant<span>It</span></div>
  <div style="display:flex;gap:8px">
    <button class="hbtn" id="btn-regen">↻ Redraw</button>
    <button class="hbtn" id="btn-export">↓ PNG</button>
    <button class="hbtn" id="btn-about">About</button>
  </div>
</header>

<div id="canvas-area">
  <div id="p5-canvas-wrap"></div>
</div>

<div id="panel">
  <div class="search-row">
    <input class="sinput" id="sinput" type="text" placeholder="Plant name… bamboo, cherry, fern, lotus, pine" />
    <button class="gbtn" id="gbtn">Generate</button>
  </div>
  <div class="examples">
    <button class="exbtn" data-p="bamboo">bamboo</button>
    <button class="exbtn" data-p="cherry blossom">cherry</button>
    <button class="exbtn" data-p="fern">fern</button>
    <button class="exbtn" data-p="pine">pine</button>
    <button class="exbtn" data-p="willow">willow</button>
    <button class="exbtn" data-p="lotus">lotus</button>
    <button class="exbtn" data-p="cactus">cactus</button>
    <button class="exbtn" data-p="ginkgo">ginkgo</button>
    <button class="exbtn" data-p="moss">moss</button>
    <button class="exbtn" data-p="sunflower">sunflower</button>
  </div>
  <div id="meta-row">
    <div>
      <div class="plant-name" id="pname"></div>
      <div class="plant-sci" id="psci"></div>
      <div class="plant-tags" id="ptags"></div>
    </div>
    <button class="expbtn" id="expbtn">↓ Export</button>
  </div>
  <div id="status">Search a plant to generate its portrait.</div>
</div>

<div class="modal-bd" id="about-modal">
  <div class="modal">
    <button class="mclose" id="mclose">×</button>
    <h3>Plant It</h3>
    <p>Search any plant → fetch real species data from iNaturalist → generate a unique hand-drawn botanical portrait.</p>
    <p>Every generation is different. Every plant has its own growth logic.</p>
    <p style="margin-top:10px;color:#bbb;font-size:11px">Made with p5.js + rough.js</p>
  </div>
</div>

<script>
// ---- Plant profile ----
function plantProfile(name) {
  var n = name.toLowerCase();
  var p = {form:'tree', depth:5, angle:28, ratio:0.70, branches:2,
    trunkCol:'#6b4c2a', leafCol:'#4a7a38', leafSize:7, name:name};

  if (/bamboo|grass|reed|sedge/.test(n))
    Object.assign(p,{form:'grass',angle:6,depth:6,ratio:0.9,trunkCol:'#5a7a2a',leafCol:'#80b840',leafSize:18});
  else if (/fern|pterid/.test(n))
    Object.assign(p,{form:'fern',angle:35,depth:5,ratio:0.62,trunkCol:'#3a5a20',leafCol:'#5a9030',leafSize:8});
  else if (/moss|lichen/.test(n))
    Object.assign(p,{form:'fern',angle:55,depth:4,ratio:0.50,trunkCol:'#4a5a20',leafCol:'#708830',leafSize:3});
  else if (/cactus|succulent|aloe/.test(n))
    Object.assign(p,{form:'cactus',angle:40,depth:3,ratio:0.65,trunkCol:'#4a7038',leafCol:'#60a040'});
  else if (/cherry|sakura|plum|prunus|magnol|peach/.test(n))
    Object.assign(p,{form:'flower',angle:42,depth:5,ratio:0.68,branches:3,trunkCol:'#7a3828',leafCol:'#f0a0b0',leafSize:5});
  else if (/pine|fir|spruce|cedar|pinus/.test(n))
    Object.assign(p,{form:'pine',angle:22,depth:7,ratio:0.76,trunkCol:'#4a3018',leafCol:'#2a5820',leafSize:3});
  else if (/willow|salix/.test(n))
    Object.assign(p,{form:'willow',angle:50,depth:5,ratio:0.76,trunkCol:'#5a4010',leafCol:'#8aaa30',leafSize:12});
  else if (/lotus|waterlily|nymphae/.test(n))
    Object.assign(p,{form:'flower',angle:55,depth:3,ratio:0.78,branches:5,trunkCol:'#3a6830',leafCol:'#f0c840',leafSize:14});
  else if (/sunflower|helianthus/.test(n))
    Object.assign(p,{form:'flower',angle:58,depth:3,ratio:0.60,branches:4,trunkCol:'#5a4010',leafCol:'#e8b820',leafSize:12});
  else if (/ginkgo/.test(n))
    Object.assign(p,{form:'tree',angle:24,depth:6,ratio:0.72,trunkCol:'#5a4018',leafCol:'#c8b428',leafSize:9});
  else if (/oak|maple|beech|elm/.test(n))
    Object.assign(p,{form:'tree',angle:34,depth:5,ratio:0.68,branches:3,trunkCol:'#6a4020',leafCol:'#589828',leafSize:8});

  // slight random variation
  p.angle += (Math.random()-0.5)*8;
  p.ratio += (Math.random()-0.5)*0.05;
  return p;
}

// ---- p5 sketch ----
var currentProfile = plantProfile('bamboo');
var currentCommon = 'bamboo';
var currentSci = '';
var redrawFlag = false;
var pInst = null;

var sketch = function(s) {
  var rc = null;
  var W, H;

  s.setup = function() {
    var area = document.getElementById('canvas-area');
    var size = Math.min(area.clientWidth - 32, area.clientHeight - 16, 520);
    size = Math.max(size, 280);
    W = size; H = size;
    var cnv = s.createCanvas(W, H);
    cnv.parent('p5-canvas-wrap');
    rc = rough.canvas(cnv.elt);
    s.noLoop();
    drawScene();
  };

  s.windowResized = function() {
    var area = document.getElementById('canvas-area');
    var size = Math.min(area.clientWidth - 32, area.clientHeight - 16, 520);
    size = Math.max(size, 280);
    W = size; H = size;
    s.resizeCanvas(W, H);
    rc = rough.canvas(s.canvas);
    drawScene();
  };

  function drawScene() {
    // Background — warm paper
    s.background(253, 250, 244);

    // Subtle grid
    s.stroke(175, 165, 148, 30);
    s.strokeWeight(0.5);
    for (var gx = 0; gx < W; gx += 32) s.line(gx, 0, gx, H);
    for (var gy = 0; gy < H; gy += 32) s.line(0, gy, W, gy);

    // Ground line (rough)
    var p = currentProfile;
    rc.line(20, H-38, W-20, H-38, {
      stroke: 'rgba(100,80,50,0.18)', strokeWidth: 1, roughness: 1.8
    });

    // Draw plant from ground center
    s.push();
    s.translate(W/2, H-38);
    if      (p.form==='grass')  drawGrass(p);
    else if (p.form==='fern')   drawFern(p);
    else if (p.form==='pine')   drawPine(p);
    else if (p.form==='willow') drawWillow(p);
    else if (p.form==='cactus') drawCactus(p);
    else if (p.form==='flower') drawFlower(p);
    else                        drawTree(p, p.depth, 80, -s.HALF_PI);
    s.pop();

    // Annotations
    s.noStroke();
    s.fill(100, 88, 68, 80);
    s.textFont('Outfit');
    s.textSize(10);
    s.textStyle(s.NORMAL);
    s.textAlign(s.LEFT);
    s.text(currentCommon, 16, H-18);
    s.fill(100, 88, 68, 55);
    s.textSize(9);
    s.textStyle(s.ITALIC);
    s.text(currentSci, 16, H-8);
    s.textAlign(s.RIGHT);
    s.textStyle(s.NORMAL);
    s.fill(100, 88, 68, 45);
    s.text('Plant It', W-16, H-14);
  }

  // --- rough helpers ---
  function rLine(x1,y1,x2,y2,col,wt,rough2) {
    rc.line(x1,y1,x2,y2,{stroke:col,strokeWidth:wt||1,roughness:rough2||1.4});
  }
  function rEllipse(x,y,rw,rh,fill,stroke2,wt,rough2) {
    rc.ellipse(x,y,rw*2,rh*2,{fill:fill||'transparent',stroke:stroke2||fill||'transparent',strokeWidth:wt||0.8,fillStyle:'solid',roughness:rough2||1.6,fillWeight:0.5});
  }

  // --- Tree (recursive) ---
  function drawTree(p, depth, len, angle) {
    if (depth<=0||len<3) return;
    var x2 = Math.cos(angle)*len;
    var y2 = Math.sin(angle)*len;
    var col = depth<=2 ? p.leafCol+'99' : p.trunkCol;
    var wt = Math.max(0.5, depth*0.9);
    rLine(0,0,x2,y2,col,wt,depth<=2?1.8:1.2);
    s.push(); s.translate(x2,y2);
    if (depth<=2) drawLeaf(p, angle);
    var aRad = s.radians(p.angle);
    for (var b=0;b<p.branches;b++) {
      var ba = angle + (b-(p.branches-1)/2)*aRad + s.random(-0.1,0.1);
      drawTree(p, depth-1, len*p.ratio*s.random(0.88,1.12), ba);
    }
    s.pop();
  }

  // --- Leaf ---
  function drawLeaf(p, angle) {
    s.push(); s.rotate(angle + s.HALF_PI);
    var sz = p.leafSize || 6;
    rEllipse(0, -sz*0.5, sz*0.28, sz*0.52, p.leafCol+'88', p.leafCol+'66', 0.5, 1.5);
    s.pop();
  }

  // --- Pine ---
  function drawPine(p) {
    var tiers = p.depth - 1;
    var trunkH = 28 + s.random(-5,5);
    rLine(0,0,0,-trunkH, p.trunkCol, 3, 1.0);
    s.push(); s.translate(0,-trunkH);
    for (var t=0;t<tiers;t++) {
      var frac = t/tiers;
      var tw = (70*(1-frac*0.65)) * (1+s.random(-0.06,0.06));
      var th = 22+frac*8;
      var yo = -th*0.45*t;
      rc.polygon([
        [0, yo-th], [tw/2+s.random(-3,3), yo], [-tw/2+s.random(-3,3), yo]
      ], {fill:p.leafCol+'55', stroke:p.leafCol, strokeWidth:0.7,
          fillStyle:'hachure', hachureAngle:55, hachureGap:4, roughness:1.8});
    }
    s.pop();
  }

  // --- Fern ---
  function drawFern(p) {
    function frond(depth, len, angle) {
      if(depth<=0||len<2) return;
      var x2=Math.cos(angle)*len, y2=Math.sin(angle)*len;
      rLine(0,0,x2,y2, depth<=1?p.leafCol:p.trunkCol, Math.max(0.4,depth*0.45), 1.6);
      s.push(); s.translate(x2,y2);
      frond(depth-1, len*0.88, angle+s.random(-0.06,0.06));
      var pa = s.radians(p.angle);
      if(depth>1){
        frond(depth-2, len*0.42, angle+pa);
        frond(depth-2, len*0.42, angle-pa);
      } else {
        drawLeaf(p, angle+pa); drawLeaf(p, angle-pa);
      }
      s.pop();
    }
    for(var i=0;i<3;i++){
      s.push(); s.rotate((i-1)*0.20);
      frond(p.depth, 88+i*10, -s.HALF_PI);
      s.pop();
    }
  }

  // --- Grass/Bamboo ---
  function drawGrass(p) {
    var nS = 5 + Math.floor(s.random(0,5));
    for(var i=0;i<nS;i++){
      var sx = (i-(nS-1)/2)*20 + s.random(-5,5);
      s.push(); s.translate(sx,0);
      var sh = 60+s.random(0,65);
      var nodes = 3+Math.floor(s.random(0,3));
      var cx2 = s.random(-16,16);
      // Stem as rough bezier segments
      for(var seg=0;seg<nodes;seg++){
        var t0=seg/nodes, t1=(seg+1)/nodes;
        var y0=-sh*t0, y1=-sh*t1;
        var nx0=cx2*(2*t0*(1-t0))+(cx2*0.4)*t0*t0;
        var nx1=cx2*(2*t1*(1-t1))+(cx2*0.4)*t1*t1;
        rLine(nx0,y0,nx1,y1, p.trunkCol, 1.4+s.random(0,0.4), 0.8);
        // Node ring
        rc.ellipse(nx1,y1,4,2.5,{stroke:p.trunkCol,strokeWidth:1,roughness:0.8,fill:'none'});
        // Leaf at node
        s.push(); s.translate(nx1,y1);
        var ld = seg%2===0?1:-1;
        s.rotate(-s.HALF_PI + ld*0.42);
        var lsz = p.leafSize;
        rEllipse(0,-lsz*0.5,lsz*0.22,lsz*0.5,p.leafCol+'77',p.leafCol+'55',0.5,1.6);
        s.pop();
      }
      s.pop();
    }
  }

  // --- Willow ---
  function drawWillow(p) {
    var th = 75+s.random(-10,10);
    rLine(0,0,0,-th, p.trunkCol, 4, 1.0);
    s.push(); s.translate(0,-th);
    var nb = 6+Math.floor(s.random(0,5));
    for(var b=0;b<nb;b++){
      var ba = s.random(-0.7,0.7);
      var bl = 28+s.random(0,28);
      var bx = Math.cos(-s.HALF_PI+ba)*bl;
      var by = Math.sin(-s.HALF_PI+ba)*bl;
      rLine(0,0,bx,by, p.trunkCol, 1.2, 1.0);
      // Drooping strands from branch end
      s.push(); s.translate(bx,by);
      var ns = 2+Math.floor(s.random(0,4));
      for(var st=0;st<ns;st++){
        var sx2 = s.random(-10,10);
        var dl = 20+s.random(0,30);
        // Hand-draw drooping strand as 3-point polyline
        rc.linearPath([
          [sx2,0],
          [sx2+s.random(-8,8),dl*0.5],
          [sx2+s.random(-6,6),dl]
        ], {stroke:p.leafCol+'aa',strokeWidth:0.7,roughness:2.0});
      }
      s.pop();
    }
    s.pop();
  }

  // --- Cactus ---
  function drawCactus(p) {
    function arm(h, w, depth2) {
      if(depth2<=0) return;
      // Body
      rc.rectangle(-w/2,-h,w,h,{
        fill:p.leafCol+'55',stroke:p.trunkCol,strokeWidth:0.8,
        fillStyle:'solid',roughness:1.4
      });
      // Spine lines
      for(var sp=0;sp<4;sp++){
        var sy = -h*(0.15+sp*0.22);
        rLine(-w/2,sy,-w/2-5,sy-3,p.trunkCol+'88',0.5,0.8);
        rLine(w/2,sy,w/2+5,sy-3,p.trunkCol+'88',0.5,0.8);
      }
      if(depth2>1&&s.random()>.45){
        s.push();s.translate(-w/2,-h*0.55);s.rotate(-s.HALF_PI);arm(h*0.58,w*0.72,depth2-1);s.pop();
      }
      if(depth2>1&&s.random()>.45){
        s.push();s.translate(w/2,-h*0.55);s.rotate(s.HALF_PI);arm(h*0.58,w*0.72,depth2-1);s.pop();
      }
    }
    arm(85,20,p.depth);
  }

  // --- Flower ---
  function drawFlower(p) {
    function branch(depth2,len,angle) {
      if(depth2<=0||len<5) return;
      var x2=Math.cos(angle)*len, y2=Math.sin(angle)*len;
      rLine(0,0,x2,y2, p.trunkCol, Math.max(0.5,depth2*0.65), 1.2);
      s.push(); s.translate(x2,y2);
      if(depth2===1){
        // Petals
        var petals = 5+Math.floor(s.random(0,4));
        for(var pe=0;pe<petals;pe++){
          var pa2 = (pe/petals)*s.TWO_PI;
          var psz = p.leafSize;
          s.push(); s.rotate(pa2);
          rEllipse(0,-psz,psz*0.35,psz, p.leafCol+'88', p.leafCol+'66', 0.6, 1.8);
          s.pop();
        }
        // Center
        rEllipse(0,0,p.leafSize*0.4,p.leafSize*0.4,'#f8e040aa','#e8c030',0.8,1.2);
      } else {
        var aRad=s.radians(p.angle);
        for(var b=0;b<p.branches;b++){
          var ba=angle+(b-(p.branches-1)/2)*aRad+s.random(-0.1,0.1);
          branch(depth2-1,len*p.ratio*s.random(0.85,1.12),ba);
        }
      }
      s.pop();
    }
    branch(p.depth,72,-s.HALF_PI);
  }

  s.redrawPlant = function(prof, common, sci) {
    currentProfile = prof;
    currentCommon = common;
    currentSci = sci;
    drawScene();
  };
};

pInst = new p5(sketch);

// ---- iNaturalist API ----
function fetchPlant(name, cb) {
  var url = 'https://api.inaturalist.org/v1/taxa'
    + '?q=' + encodeURIComponent(name)
    + '&taxon_id=47126&rank=species,genus,family&per_page=3&order_by=observations_count';
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      cb(null, d.results&&d.results.length>0 ? d.results[0] : null);
    })
    .catch(function(){ cb(null,null); });
}

// ---- Generate ----
var busy = false;
function generate(name) {
  if(busy) return;
  busy=true;
  document.getElementById('gbtn').disabled=true;
  document.getElementById('status').textContent='Generating…';

  var prof = plantProfile(name);
  // Draw immediately with local profile
  pInst.redrawPlant(prof, name, '');
  document.getElementById('pname').textContent=name;
  document.getElementById('psci').textContent='';
  document.getElementById('ptags').innerHTML='';
  document.getElementById('meta-row').style.display='flex';
  document.getElementById('status').textContent='';

  // Then enrich with API in background
  fetchPlant(name, function(err, taxon) {
    busy=false;
    document.getElementById('gbtn').disabled=false;
    if(taxon) {
      var common = taxon.preferred_common_name || taxon.name || name;
      var sci = taxon.name||'';
      document.getElementById('pname').textContent=common;
      document.getElementById('psci').textContent=sci;
      var tagsEl=document.getElementById('ptags');
      tagsEl.innerHTML='';
      [taxon.iconic_taxon_name, taxon.rank].filter(Boolean).forEach(function(t){
        var sp=document.createElement('span');sp.className='ptag';sp.textContent=t;tagsEl.appendChild(sp);
      });
      // Re-draw with updated labels
      pInst.redrawPlant(prof, common, sci);
    }
  });
}

// ---- UI ----
document.getElementById('gbtn').addEventListener('click',function(){
  var v=document.getElementById('sinput').value.trim();if(v)generate(v);
});
document.getElementById('sinput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){var v=this.value.trim();if(v)generate(v);}
});
document.querySelectorAll('.exbtn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.getElementById('sinput').value=this.dataset.p;
    generate(this.dataset.p);
  });
});
document.getElementById('btn-regen').addEventListener('click',function(){
  var v=document.getElementById('sinput').value.trim()||'bamboo';generate(v);
});
function doExport(){
  var cnv=document.querySelector('#p5-canvas-wrap canvas');
  if(!cnv)return;
  var a=document.createElement('a');a.href=cnv.toDataURL('image/png');
  a.download='plantit.png';a.click();
}
document.getElementById('btn-export').addEventListener('click',doExport);
document.getElementById('expbtn').addEventListener('click',doExport);
document.getElementById('btn-about').addEventListener('click',function(){
  document.getElementById('about-modal').classList.add('open');
});
document.getElementById('mclose').addEventListener('click',function(){
  document.getElementById('about-modal').classList.remove('open');
});
document.getElementById('about-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// Initial draw
var starters=['bamboo','cherry blossom','fern','pine','willow','lotus','ginkgo','sunflower'];
var s0=starters[Math.floor(Math.random()*starters.length)];
document.getElementById('sinput').value=s0;
// Wait for p5 setup then draw
setTimeout(function(){generate(s0);},200);
</script>
</body>
</html>
